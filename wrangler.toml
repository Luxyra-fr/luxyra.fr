name = "luxyra-router"
main = "docs/luxyra-router-worker.js"
compatibility_date = "2024-09-01"

# Note importante :
# - Pas de [[routes]] ni d'[[env]] ici → wrangler ne touche PAS les routes
#   existantes (luxyra.fr/api/*, luxyra.fr/*) configurées via le dashboard
#   Cloudflare. Wrangler met juste à jour le CODE du worker.
# - Pas de [vars] non plus → les secrets existants (STRIPE_SECRET_KEY,
#   SUPABASE_SERVICE_KEY, BREVO_API_KEY, STRIPE_WEBHOOK_SECRET, etc.)
#   restent intacts entre les déploiements.
# - Tu peux toujours déployer manuellement via le dashboard si besoin —
#   les 2 méthodes coexistent sans conflit.

# Cron triggers — exécutés automatiquement par Cloudflare (gratuit, jusqu'à 1000/jour).
# Le worker doit exporter `async scheduled(event, env, ctx)` pour les recevoir.
[triggers]
crons = [
  # Tous les jours à 3h00 UTC (= 4h ou 5h heure française selon saison).
  # Job = email préavis 1 mois avant les 6 ans + purge des salons résiliés > 6 ans.
  "0 3 * * *"
]
